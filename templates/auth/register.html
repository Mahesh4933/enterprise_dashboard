<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Enterprise Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="register-card animate-fade-in">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-person-plus-fill text-primary"></i> Create Account</h2>
            {% if is_first_user %}
                <p class="text-warning">No users found. Creating the primary administrator.</p>
            {% else %}
                <p class="text-muted">Register a new system user profile</p>
            {% endif %}
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label text-muted">Username</label>
                <input type="text" name="username" class="form-control bg-dark border-secondary text-white" id="username" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control bg-dark border-secondary text-white" id="password" placeholder="••••••••" required>
            </div>
            
            {% if not is_first_user %}
            <div class="mb-4">
                <label for="role" class="form-label text-muted">Access Level / Role</label>
                <select name="role" id="role" class="form-select bg-dark border-secondary text-white">
                    <option value="employee">Employee (View only & Log orders)</option>
                    <option value="manager">Manager (Approve logs & Forecast)</option>
                    <option value="admin">Administrator (Full Access & CRUD)</option>
                </select>
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary-gradient w-100 py-3">Register User</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

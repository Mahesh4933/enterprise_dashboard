{% extends "base.html" %}

{% block title %}My Profile - Enterprise Analytics{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="container-fluid px-0 animate-fade-in">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="analytics-panel">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle text-primary" style="font-size: 4rem;"></i>
                    <h4 class="fw-bold mt-2">{{ current_user.username }}</h4>
                    <span class="badge bg-primary-subtle text-primary-emphasis">{{ current_user.role | capitalize }} Account</span>
                </div>
                
                <form action="{{ url_for('main.profile') }}" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted">First Name</label>
                            <input type="text" name="first_name" class="form-control" value="{{ employee.first_name if employee else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted">Last Name</label>
                            <input type="text" name="last_name" class="form-control" value="{{ employee.last_name if employee else '' }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted">Contact Email</label>
                            <input type="email" name="email" class="form-control" value="{{ employee.email if employee else '' }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-muted">Phone Number</label>
                            <input type="text" name="phone" class="form-control" value="{{ employee.phone if employee else '' }}">
                        </div>
                        {% if employee %}
                            <div class="col-md-6">
                                <label class="form-label text-muted">Department</label>
                                <input type="text" class="form-control" value="{{ employee.department }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Hire Date</label>
                                <input type="text" class="form-control" value="{{ employee.hire_date.strftime('%Y-%m-%d') }}" disabled>
                            </div>
                        {% endif %}
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary-gradient w-100 py-2">Update Profile Details</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
